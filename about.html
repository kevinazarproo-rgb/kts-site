<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KTS Travel — Our Story · Bespoke French Travel Since 1987</title>
<meta name="description" content="The story of KTS Travel — a Parisian Destination Management Company crafting singular journeys for VIP travellers, corporate incentives and group tours since 1987.">
<link rel="icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KTS TRAVEL — "ATLAS" DESIGN SYSTEM
   Each page is a destination dossier.
   Aged paper + ink, monospace metadata, per-page accent.
   ============================================================ */

/* cyrillic-ext */
:root {
  /* ---- Core neutrals (warm atlas paper + ink) ---- */
  --ink:        #1b1712;            /* @kind color  near-black warm */
  --ink-soft:   #38302a;            /* @kind color */
  --paper:      #ece4d6;            /* @kind color  aged paper */
  --paper-2:    #f4eee2;            /* @kind color  lighter paper */
  --paper-3:    #e2d8c6;            /* @kind color  darker paper / panels */
  --bone:       #d8ccb6;            /* @kind color */

  /* ---- Per-page destination accent (overridden by [data-place]) ---- */
  --accent:       #b5462e;          /* @kind color  vermilion (Paris default) */
  --accent-deep:  #8f3320;          /* @kind color */
  --accent-soft:  #d98c6a;          /* @kind color */

  /* ---- Gilt (passport stamp metallic, fixed) ---- */
  --gilt:       #a8762e;            /* @kind color */

  /* ---- Legacy token aliases (kept so inline JS styles still resolve) ---- */
  --navy-900:  var(--ink);         /* @kind color */
  --navy-800:  var(--ink-soft);    /* @kind color */
  --navy-700:  var(--ink-soft);    /* @kind color */
  --navy-600:  var(--ink-soft);    /* @kind color */
  --teal-500:  var(--accent);      /* @kind color */
  --teal-400:  var(--accent);      /* @kind color */
  --teal-300:  var(--accent-soft); /* @kind color */
  --copper:        var(--gilt);    /* @kind color */
  --copper-light:  var(--accent-soft); /* @kind color */
  --copper-pale:   var(--bone);    /* @kind color */
  --ivory:      var(--paper);      /* @kind color */
  --ivory-warm: var(--paper-3);    /* @kind color */
  --bg:        var(--paper);       /* @kind color */
  --bg-alt:    var(--paper-2);     /* @kind color */
  --bg-dark:   var(--ink);         /* @kind color */
  --stone-700: #6b6157;            /* @kind color */
  --stone-500: #8f8576;            /* @kind color */
  --stone-300: #b6ab97;            /* @kind color */

  /* ---- Foreground ---- */
  --fg:        var(--ink);         /* @kind color */
  --fg-muted:  #5c5249;            /* @kind color */
  --fg-light:  #8a7f70;            /* @kind color */
  --line:        rgba(27, 23, 18, 0.16); /* @kind color */
  --line-strong: rgba(27, 23, 18, 0.34); /* @kind color */

  /* ---- Type ---- */
  --serif: 'Instrument Serif', 'Times New Roman', serif; /* @kind font */
  --sans:  'Hanken Grotesk', -apple-system, sans-serif;  /* @kind font */
  --mono:  'JetBrains Mono', ui-monospace, monospace;    /* @kind font */

  /* ---- Spacing ---- */
  --space-1: 0.25rem;  /* @kind spacing */
  --space-2: 0.5rem;   /* @kind spacing */
  --space-3: 1rem;     /* @kind spacing */
  --space-4: 1.5rem;   /* @kind spacing */
  --space-5: 2rem;     /* @kind spacing */
  --space-6: 3rem;     /* @kind spacing */
  --space-7: 4.5rem;   /* @kind spacing */
  --space-8: 6rem;     /* @kind spacing */
  --space-9: 9rem;     /* @kind spacing */

  /* ---- Misc ---- */
  --radius: 0px;                              /* @kind radius  sharp atlas edges */
  --ease:      cubic-bezier(0.22, 1, 0.36, 1);   /* @kind other */
  --ease-soft: cubic-bezier(0.4, 0, 0.2, 1);     /* @kind other */
  --maxw: 1480px;
}

/* ---- Destination accents per page ---- */
[data-place="paris"]       { --accent:#b5462e; --accent-deep:#8f3320; --accent-soft:#dc9277; } /* vermilion */
[data-place="maison"]      { --accent:#9a7222; --accent-deep:#735318; --accent-soft:#d6b977; } /* gilt ochre */
[data-place="provence"]    { --accent:#6d5a9c; --accent-deep:#4f3f78; --accent-soft:#a99bcf; } /* lavender */
[data-place="world"]       { --accent:#1f6f59; --accent-deep:#155041; --accent-soft:#6cae9b; } /* emerald */
[data-place="bureau"]      { --accent:#2f4a8c; --accent-deep:#21356a; --accent-soft:#8095c4; } /* ink blue */
[data-place="atelier"]     { --accent:#94405e; --accent-deep:#6f2e46; --accent-soft:#c98aa1; } /* plum */

* { box-sizing: border-box; margin: 0; padding: 0; }

html {
  scroll-behavior: smooth;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--sans);
  font-weight: 400;
  font-size: 1rem;
  line-height: 1.6;
  color: var(--fg);
  background: var(--paper);
  overflow-x: hidden;
}

/* subtle paper grain on the whole site */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  opacity: 0.5;
  mix-blend-mode: multiply;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(120,100,70,0.05) 0, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(120,100,70,0.05) 0, transparent 40%);
}

/* ============================================================
   TYPOGRAPHY
   ============================================================ */
h1, h2, h3, h4 {
  font-weight: 400;
  line-height: 1.04;
  color: var(--ink);
  text-wrap: balance;
}

.display, .hero-title, .page-hero-content .hero-title {
  font-family: var(--serif);
  font-weight: 400;
  letter-spacing: -0.01em;
}

.serif { font-family: var(--serif); }
.mono  { font-family: var(--mono); }

h1 { font-family: var(--serif); font-size: clamp(2.75rem, 7vw, 6rem); letter-spacing: -0.01em; }
h2 { font-family: var(--serif); font-size: clamp(2rem, 4.5vw, 3.75rem); letter-spacing: -0.005em; }
h3 { font-family: var(--serif); font-size: clamp(1.5rem, 2.6vw, 2.25rem); }
h4 { font-family: var(--sans); font-size: 1.0625rem; font-weight: 600; letter-spacing: -0.005em; }

.display {
  font-size: clamp(3rem, 8vw, 7rem);
  line-height: 0.98;
}
.display em, .display-italic { font-style: italic; color: var(--accent); }

/* The monospace overline — the atlas signature */
.eyebrow {
  font-family: var(--mono);
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  display: inline-flex;
  align-items: center;
  gap: 0.7rem;
}
.eyebrow::before {
  content: '';
  width: 18px;
  height: 1px;
  background: currentColor;
  display: inline-block;
}

.lede {
  font-family: var(--sans);
  font-size: 1.1875rem;
  line-height: 1.6;
  color: var(--fg-muted);
  font-weight: 400;
  text-wrap: pretty;
  max-width: 56ch;
}

p { text-wrap: pretty; max-width: 66ch; }

a { color: inherit; text-decoration: none; transition: color 0.3s var(--ease); }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }

/* ============================================================
   LAYOUT
   ============================================================ */
.container {
  width: 100%;
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 clamp(1.25rem, 4vw, 3.5rem);
  position: relative;
  z-index: 2;
}
.section { padding: var(--space-9) 0; position: relative; z-index: 2; }
@media (max-width: 768px) { .section { padding: var(--space-7) 0; } }

/* a hairline rule used to separate dossier sections */
.rule { height: 1px; background: var(--line); width: 100%; }

/* ============================================================
   TOP TICKER (departure board)
   ============================================================ */
.ticker {
  background: var(--ink);
  color: var(--paper);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  overflow: hidden;
  position: relative;
  z-index: 3;
}
.ticker-track {
  display: flex;
  gap: 3rem;
  white-space: nowrap;
  width: max-content;
  animation: ticker 38s linear infinite;
  padding: 0.6rem 0;
}
.ticker-item {
  display: inline-flex;
  align-items: center;
  gap: 0.7rem;
  font-family: var(--mono);
  font-size: 0.6875rem;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(236,228,214,0.72);
}
.ticker-item b { color: var(--accent-soft); font-weight: 500; }
.ticker-item .star { color: var(--accent-soft); }
@keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* ============================================================
   NAVIGATION
   ============================================================ */
.nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  padding: 1.1rem 0;
  transition: background 0.4s var(--ease), padding 0.4s var(--ease), border-color 0.4s var(--ease);
  border-bottom: 1px solid transparent;
}
.nav.scrolled {
  background: rgba(236,228,214,0.9);
  backdrop-filter: blur(14px) saturate(120%);
  -webkit-backdrop-filter: blur(14px) saturate(120%);
  border-bottom: 1px solid var(--line);
  padding: 0.75rem 0;
}
.nav-inner { display: flex; align-items: center; justify-content: space-between; gap: 2rem; }

.nav-logo { display: flex; align-items: center; gap: 0.75rem; }
.nav-logo img {
  height: 38px; width: auto;
  transition: filter 0.4s var(--ease);
  filter: brightness(0) saturate(100%) invert(8%) sepia(18%) saturate(900%) hue-rotate(350deg) brightness(96%) contrast(92%);
}
.nav.over-dark:not(.scrolled) .nav-logo img { filter: brightness(0) invert(1); }

.nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
.nav-link {
  font-family: var(--mono);
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink);
  position: relative;
  padding: 0.3rem 0;
  transition: color 0.3s var(--ease);
}
.nav.over-dark:not(.scrolled) .nav-link,
.nav.over-dark:not(.scrolled) .nav-logo,
.nav.over-dark:not(.scrolled) .lang-toggle { color: var(--paper); }

.nav-link::after {
  content: '';
  position: absolute; left: 0; bottom: -1px;
  width: 0; height: 2px; background: var(--accent);
  transition: width 0.35s var(--ease);
}
.nav-link:hover::after, .nav-link.active::after { width: 100%; }
.nav-link.active { color: var(--accent); }
.nav.over-dark:not(.scrolled) .nav-link.active { color: var(--accent-soft); }

.nav-actions { display: flex; align-items: center; gap: 1.25rem; }
.lang-toggle {
  display: flex; font-family: var(--mono); font-size: 0.6875rem;
  font-weight: 500; letter-spacing: 0.08em; color: var(--ink);
}
.lang-toggle button { padding: 0.2rem 0.4rem; color: inherit; opacity: 0.45; transition: opacity 0.3s var(--ease); }
.lang-toggle button.active { opacity: 1; }
.lang-toggle .sep { opacity: 0.3; }

@media (max-width: 980px) { .nav-links { display: none; } }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.6rem;
  padding: 0.95rem 1.7rem;
  font-family: var(--mono);
  font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
  border-radius: var(--radius);
  border: 1px solid transparent;
  transition: all 0.35s var(--ease);
  position: relative;
}
.btn-primary { background: var(--accent); color: var(--paper-2); }
.btn-primary:hover { background: var(--accent-deep); transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn-ghost:hover { background: var(--ink); color: var(--paper); }
.btn-ghost.on-dark { color: var(--paper); border-color: rgba(255,255,255,0.45); }
.btn-ghost.on-dark:hover { background: var(--paper); color: var(--ink); border-color: var(--paper); }

.btn-link {
  display: inline-flex; align-items: center; gap: 0.7rem;
  padding: 0.6rem 0;
  font-family: var(--mono); font-size: 0.6875rem; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink);
  border-bottom: 1px solid var(--line-strong);
  transition: all 0.35s var(--ease);
}
.btn-link .arrow { display: inline-block; transition: transform 0.35s var(--ease); }
.btn-link:hover { color: var(--accent); border-bottom-color: var(--accent); }
.btn-link:hover .arrow { transform: translateX(6px); }

/* ============================================================
   REVEAL
   ============================================================ */
.reveal { opacity: 0; transform: translateY(26px); transition: opacity 0.9s var(--ease), transform 0.9s var(--ease); }
.reveal.in { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.08s; }
.reveal-delay-2 { transition-delay: 0.16s; }
.reveal-delay-3 { transition-delay: 0.24s; }
.reveal-delay-4 { transition-delay: 0.32s; }
@media (prefers-reduced-motion: reduce) {
  .reveal { opacity: 1; transform: none; transition: none; }
}

/* ============================================================
   IMAGE TREATMENTS
   ============================================================ */
.img-frame { position: relative; overflow: hidden; background: var(--bone); }
.img-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s var(--ease); }
.img-frame:hover img { transform: scale(1.05); }

@keyframes kenburns { 0% { transform: scale(1.06); } 100% { transform: scale(1.18); } }
.kenburns { animation: kenburns 16s ease-in-out infinite alternate; }

/* ============================================================
   DESTINATION HERO  (shared: home + inner pages)
   ============================================================ */
.dhero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
  background: var(--ink);
  color: var(--paper);
  padding: 7rem 0 2.5rem;
}
.dhero.short { min-height: 78vh; }

.dhero-bg { position: absolute; inset: 0; z-index: 0; }
.dhero-bg img { width: 100%; height: 100%; object-fit: cover; }
.dhero-bg::after {
  content: '';
  position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(20,16,12,0.55) 0%, rgba(20,16,12,0.18) 30%, rgba(20,16,12,0.35) 60%, rgba(20,16,12,0.92) 100%);
}

/* corner registration marks */
.dhero-frame { position: absolute; inset: 1.5rem; z-index: 2; pointer-events: none; }
.dhero-frame span {
  position: absolute; width: 22px; height: 22px;
  border-color: rgba(236,228,214,0.5); border-style: solid; border-width: 0;
}
.dhero-frame .tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }
.dhero-frame .tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }
.dhero-frame .bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }
.dhero-frame .br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }

.dhero-top {
  position: absolute; top: 6.5rem; left: 0; right: 0; z-index: 2;
}
.dhero-dossier {
  display: flex; justify-content: space-between; align-items: baseline; gap: 1rem;
  font-family: var(--mono); font-size: 0.6875rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(236,228,214,0.7);
  border-bottom: 1px solid rgba(236,228,214,0.2);
  padding-bottom: 0.9rem;
}
.dhero-dossier b { color: var(--accent-soft); font-weight: 500; }

.dhero-content { position: relative; z-index: 2; }
.dhero-country {
  font-family: var(--mono); font-size: 0.8125rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--accent-soft); margin-bottom: 0.75rem; display: block;
}
.dhero-name {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(3.5rem, 13vw, 12rem);
  line-height: 0.86; letter-spacing: -0.02em;
  color: var(--paper);
  margin-bottom: 1.75rem;
}
.dhero-name em { font-style: italic; color: var(--accent-soft); }
.dhero-sub {
  font-family: var(--sans); font-weight: 400; font-size: 1.125rem; line-height: 1.6;
  color: rgba(236,228,214,0.86); max-width: 46ch; margin-bottom: 2rem;
}
.dhero-actions { display: flex; gap: 0.9rem; flex-wrap: wrap; }

/* metadata strip across the bottom */
.dhero-meta {
  display: grid; grid-template-columns: repeat(4, auto); gap: 2.5rem;
  margin-top: 2.75rem; padding-top: 1.5rem;
  border-top: 1px solid rgba(236,228,214,0.2);
  font-family: var(--mono);
}
.dhero-meta .k { font-size: 0.625rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(236,228,214,0.55); margin-bottom: 0.4rem; }
.dhero-meta .v { font-size: 0.9375rem; color: var(--paper); letter-spacing: 0.04em; }
@media (max-width: 760px) {
  .dhero-meta { grid-template-columns: repeat(2, auto); gap: 1.5rem 2.5rem; }
}

/* home rotator support */
.dhero-rotator-counter {
  position: absolute; right: clamp(1.25rem,4vw,3.5rem); bottom: 2.5rem; z-index: 3;
  display: flex; align-items: center; gap: 1rem;
  font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.1em; color: rgba(236,228,214,0.7);
}
.dhero-arrows { display: flex; gap: 0.5rem; }
.dhero-arrow {
  width: 42px; height: 42px; border: 1px solid rgba(236,228,214,0.35);
  display: flex; align-items: center; justify-content: center; color: var(--paper);
  transition: all 0.3s var(--ease);
}
.dhero-arrow:hover { background: var(--paper); color: var(--ink); border-color: var(--paper); }

.dhero-slide-imgs { position: absolute; inset: 0; z-index: 0; }
.dhero-slide-imgs > div { position: absolute; inset: 0; opacity: 0; transition: opacity 1.3s var(--ease); }
.dhero-slide-imgs > div.active { opacity: 1; }
.dhero-slide-imgs img { width: 100%; height: 100%; object-fit: cover; }

.dhero-scroll {
  position: absolute; bottom: 2.2rem; left: 50%; transform: translateX(-50%); z-index: 3;
  display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(236,228,214,0.6);
}
.dhero-scroll .line { width: 1px; height: 42px; background: linear-gradient(to bottom, transparent, rgba(236,228,214,0.6)); position: relative; overflow: hidden; }
.dhero-scroll .line::after { content:''; position:absolute; inset:0; background: var(--accent-soft); transform: translateY(-100%); animation: scrollLine 2.4s ease-in-out infinite; }
@keyframes scrollLine { 0%{transform:translateY(-100%);} 60%{transform:translateY(100%);} 100%{transform:translateY(100%);} }

@media (max-width: 760px) {
  .dhero-rotator-counter { display: none; }
}

/* ============================================================
   INTRO / STATS
   ============================================================ */
.intro { background: var(--paper); }
.intro-grid { display: grid; grid-template-columns: 1.05fr 1fr; gap: var(--space-8); align-items: center; }
.intro-text .display { margin: 1.5rem 0 1.75rem; }
.intro-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 2.5rem; padding-top: 2.5rem; border-top: 1px solid var(--line); }
.stat-num { font-family: var(--serif); font-size: 3.25rem; color: var(--ink); line-height: 1; margin-bottom: 0.4rem; }
.stat-label { font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-muted); }

.intro-image { position: relative; aspect-ratio: 4/5; overflow: hidden; border: 1px solid var(--line); }
.intro-image-2 { position: absolute; bottom: -2.5rem; right: -2rem; width: 48%; aspect-ratio: 3/4; border: 6px solid var(--paper); z-index: 3; }
@media (max-width: 900px) {
  .intro-grid { grid-template-columns: 1fr; gap: 3.5rem; }
  .intro-image-2 { right: 1rem; bottom: -1.5rem; width: 40%; }
}

/* ============================================================
   SECTION HEADERS (shared)
   ============================================================ */
.services-head, .dest-head {
  display: grid; grid-template-columns: 1fr 1fr; gap: 3.5rem; align-items: end; margin-bottom: 4rem;
}
.dest-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 2rem; flex-wrap: wrap; }
.services-head h2 em, .dest-head h2 em { font-style: italic; color: var(--accent); }
@media (max-width: 900px) { .services-head { grid-template-columns: 1fr; gap: 1.5rem; } }

/* ============================================================
   SERVICES — numbered dossier rows
   ============================================================ */
.services { background: var(--paper-2); }
.services-grid { display: flex; flex-direction: column; border-top: 1px solid var(--line-strong); }

.service-card {
  display: grid; grid-template-columns: 5rem 1fr 1.1fr; gap: 2.5rem; align-items: center;
  padding: 2.5rem 0;
  border-bottom: 1px solid var(--line);
  cursor: default;
  transition: background 0.4s var(--ease), padding 0.4s var(--ease);
}
.service-card:hover { background: var(--paper-3); padding-left: 1.5rem; padding-right: 1.5rem; }
.service-num {
  font-family: var(--mono); font-size: 0.8125rem; letter-spacing: 0.1em; color: var(--accent);
  align-self: start; padding-top: 0.5rem;
}
.service-card .service-img {
  position: relative; aspect-ratio: 16/10; overflow: hidden; order: 3; border: 1px solid var(--line);
}
.service-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.3s var(--ease); }
.service-card:hover .service-img img { transform: scale(1.06); }
.service-name {
  font-family: var(--serif); font-size: clamp(1.75rem, 3vw, 2.75rem); font-weight: 400;
  color: var(--ink); line-height: 1.04;
}
.service-name em { font-style: italic; color: var(--accent); }
.service-desc { font-family: var(--sans); margin-top: 0.9rem; font-size: 0.9375rem; line-height: 1.6; color: var(--fg-muted); max-width: 42ch; }
.service-meta, .service-arrow { display: none; }
@media (max-width: 860px) {
  .service-card { grid-template-columns: 3rem 1fr; gap: 1rem 1.5rem; }
  .service-card .service-img { grid-column: 1 / -1; order: 3; margin-top: 1rem; }
}

/* ============================================================
   QUOTE
   ============================================================ */
.quote-section { background: var(--ink); color: var(--paper); text-align: center; padding: var(--space-9) 0; }
.quote-mark { font-family: var(--serif); font-style: italic; font-size: 5rem; color: var(--accent-soft); line-height: 0.5; display: block; margin-bottom: 1rem; }
.quote-text { font-family: var(--serif); font-style: italic; font-size: clamp(1.9rem, 3.6vw, 3.25rem); line-height: 1.18; color: var(--paper); max-width: 24ch; margin: 0 auto 2.5rem; }
.quote-cite { font-family: var(--mono); font-size: 0.6875rem; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(236,228,214,0.6); }
.quote-cite strong { color: var(--accent-soft); font-weight: 500; display: block; margin-bottom: 0.3rem; }

/* ============================================================
   DESTINATIONS
   ============================================================ */
.destinations { background: var(--paper); }
.dest-tabs { display: flex; gap: 2rem; border-bottom: 1px solid var(--line); margin-bottom: 3rem; }
.dest-tab {
  padding: 0.9rem 0; font-family: var(--mono); font-size: 0.6875rem; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-muted);
  position: relative; transition: color 0.3s var(--ease);
}
.dest-tab.active { color: var(--accent); }
.dest-tab.active::after { content: ''; position: absolute; left: 0; right: 0; bottom: -1px; height: 2px; background: var(--accent); }

.dest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem 1.75rem; }
.dest-card { cursor: default; }
.dest-img { aspect-ratio: 4/5; overflow: hidden; margin-bottom: 1rem; position: relative; border: 1px solid var(--line); }
.dest-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.5s var(--ease); filter: saturate(0.92); }
.dest-card:hover .dest-img img { transform: scale(1.05); filter: saturate(1.05); }
.dest-img[data-coord]::before {
  content: attr(data-coord);
  position: absolute; top: 0.75rem; left: 0.75rem; z-index: 2;
  font-family: var(--mono); font-size: 0.5625rem; letter-spacing: 0.12em;
  color: var(--paper); background: rgba(20,16,12,0.5); padding: 0.25rem 0.5rem;
  backdrop-filter: blur(4px);
}
.dest-name { font-family: var(--serif); font-size: 1.6rem; font-weight: 400; color: var(--ink); display: flex; justify-content: space-between; align-items: baseline; gap: 0.5rem; margin-bottom: 0.3rem; }
.dest-country { font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-light); }
.dest-tagline { font-family: var(--sans); font-size: 0.875rem; color: var(--fg-muted); }
@media (max-width: 900px) { .dest-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 560px) { .dest-grid { grid-template-columns: 1fr; } }

/* ============================================================
   EXPERIENCE (split)
   ============================================================ */
.experience { background: var(--ink); color: var(--paper); overflow: hidden; }
.experience-grid { display: grid; grid-template-columns: 1fr 1fr; align-items: stretch; }
.experience-content { padding: var(--space-8) clamp(2rem,5vw,5rem); display: flex; flex-direction: column; justify-content: center; }
.experience-content .eyebrow { color: var(--accent-soft); }
.experience-content h2 { color: var(--paper); margin: 1.4rem 0 1.4rem; }
.experience-content h2 em { font-style: italic; color: var(--accent-soft); }
.experience-content p { color: rgba(236,228,214,0.78); font-size: 1.0625rem; line-height: 1.7; margin-bottom: 1.5rem; }
.experience-features { list-style: none; margin: 1.5rem 0 2.5rem; padding-top: 1.5rem; border-top: 1px solid rgba(236,228,214,0.18); }
.experience-features li { display: flex; gap: 1.1rem; padding: 0.85rem 0; border-bottom: 1px solid rgba(236,228,214,0.1); font-size: 0.9375rem; color: rgba(236,228,214,0.85); }
.experience-features .num { font-family: var(--mono); font-size: 0.8125rem; color: var(--accent-soft); min-width: 1.75rem; }
.experience-img { position: relative; min-height: 560px; overflow: hidden; }
.experience-img img { width: 100%; height: 100%; object-fit: cover; }
@media (max-width: 900px) { .experience-grid { grid-template-columns: 1fr; } .experience-img { min-height: 380px; } }

/* ============================================================
   PRESS
   ============================================================ */
.press { background: var(--paper); padding: var(--space-7) 0; border-top: 1px solid var(--line); }
.press-label { text-align: center; font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.24em; text-transform: uppercase; color: var(--fg-light); margin-bottom: 2.5rem; }
.press-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 1.5rem; align-items: center; justify-items: center; }
.press-logo { font-family: var(--serif); font-style: italic; font-size: 1.25rem; color: var(--fg-muted); opacity: 0.65; transition: opacity 0.3s var(--ease); text-align: center; }
.press-logo:hover { opacity: 1; color: var(--accent); }
@media (max-width: 768px) { .press-row { grid-template-columns: repeat(3, 1fr); gap: 2rem 1rem; } }

/* ============================================================
   TEAM
   ============================================================ */
.team { background: var(--paper-2); }
.team-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; margin-top: 3.5rem; }
.team-card { cursor: default; }
.team-img { aspect-ratio: 3/4; overflow: hidden; margin-bottom: 1.1rem; position: relative; background: var(--bone); border: 1px solid var(--line); }
.team-img img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.4) sepia(0.1); transition: transform 1.3s var(--ease), filter 0.6s var(--ease); }
.team-card:hover .team-img img { transform: scale(1.04); filter: grayscale(0) sepia(0); }
.team-name { font-family: var(--serif); font-size: 1.5rem; font-weight: 400; color: var(--ink); margin-bottom: 0.2rem; }
.team-role { font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
.team-bio { font-family: var(--sans); font-size: 0.875rem; line-height: 1.6; color: var(--fg-muted); }
@media (max-width: 900px) { .team-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 520px) { .team-grid { grid-template-columns: 1fr; } }

/* ============================================================
   CTA
   ============================================================ */
.cta { background: var(--accent-deep); color: var(--paper); position: relative; overflow: hidden; }
.cta::before {
  content: ''; position: absolute; inset: 0;
  background-image: none;
  background-size: cover; background-position: center; opacity: 0.12; mix-blend-mode: luminosity;
}
.cta-inner { position: relative; z-index: 2; text-align: center; padding: var(--space-9) 0; }
.cta h2 { color: var(--paper); font-size: clamp(2.5rem,6vw,5rem); margin: 1.4rem auto 1.4rem; max-width: 18ch; }
.cta h2 em { font-style: italic; color: var(--accent-soft); }
.cta p { color: rgba(236,228,214,0.85); font-size: 1.125rem; max-width: 52ch; margin: 0 auto 2.5rem; }
.cta-actions { display: flex; gap: 0.9rem; justify-content: center; flex-wrap: wrap; }
.cta .eyebrow { color: var(--accent-soft); justify-content: center; }

/* ============================================================
   FOOTER
   ============================================================ */
.footer { background: var(--ink); color: rgba(236,228,214,0.65); padding: var(--space-7) 0 2rem; font-family: var(--sans); font-size: 0.875rem; position: relative; z-index: 2; }
.footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1.2fr; gap: 2.5rem; margin-bottom: 3.5rem; }
.footer-brand { display: flex; flex-direction: column; gap: 1.25rem; }
.footer-brand img { height: 44px; width: auto; filter: brightness(0) invert(1); opacity: 0.9; }
.footer-brand p { font-family: var(--serif); font-style: italic; font-size: 1.125rem; color: rgba(236,228,214,0.85); line-height: 1.5; max-width: 32ch; }
.footer-contact-line { font-family: var(--mono); font-size: 0.75rem; line-height: 1.9; letter-spacing: 0.04em; color: rgba(236,228,214,0.7); }
.footer-col h5 { font-family: var(--mono); font-size: 0.625rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent-soft); margin-bottom: 1.25rem; }
.footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 0.65rem; }
.footer-col a { color: rgba(236,228,214,0.65); transition: color 0.3s var(--ease); }
.footer-col a:hover { color: var(--accent-soft); }
.footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 1.75rem; border-top: 1px solid rgba(236,228,214,0.12); font-family: var(--mono); font-size: 0.6875rem; letter-spacing: 0.06em; color: rgba(236,228,214,0.5); flex-wrap: wrap; gap: 1rem; }
.footer-socials { display: flex; gap: 1.25rem; }
.footer-socials a:hover, .footer-bottom a:hover { color: var(--accent-soft); }
@media (max-width: 900px) { .footer-grid { grid-template-columns: 1fr 1fr; gap: 2.5rem; } .footer-brand { grid-column: span 2; } }
@media (max-width: 520px) { .footer-grid { grid-template-columns: 1fr; } .footer-brand { grid-column: span 1; } }

/* ============================================================
   FORMS
   ============================================================ */
.form-label { display: block; font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 0.7rem; }
.form-input { width: 100%; padding: 0.8rem 0; font-family: var(--serif); font-size: 1.25rem; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid var(--line-strong); outline: none; transition: border-color 0.3s var(--ease); }
.form-input:focus { border-bottom-color: var(--accent); }
.form-input::placeholder { color: var(--fg-light); font-style: italic; }
.form-textarea { resize: vertical; line-height: 1.5; font-family: var(--sans); font-size: 1.0625rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
.form-field { display: flex; flex-direction: column; }
.form-field label { font-family: var(--mono); font-size: 0.625rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-muted); margin-bottom: 0.7rem; }
.form-field input, .form-field textarea { width: 100%; padding: 0.8rem 0; font-family: var(--serif); font-size: 1.25rem; color: var(--ink); background: transparent; border: none; border-bottom: 1px solid var(--line-strong); outline: none; transition: border-color 0.3s var(--ease); }
.form-field textarea { font-family: var(--sans); font-size: 1.0625rem; line-height: 1.5; resize: vertical; }
.form-field input:focus, .form-field textarea:focus { border-bottom-color: var(--accent); }
.form-field input::placeholder, .form-field textarea::placeholder { color: var(--fg-light); font-style: italic; }
.form-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.form-pill { padding: 0.55rem 1.1rem; font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.12em; text-transform: uppercase; background: transparent; color: var(--fg-muted); border: 1px solid var(--line-strong); transition: all 0.3s var(--ease); }
.form-pill:hover { border-color: var(--ink); color: var(--ink); }
.form-pill.active { background: var(--accent); color: var(--paper-2); border-color: var(--accent); }

@media (max-width: 900px) {
  .about-grid, .contact-grid { grid-template-columns: 1fr !important; gap: 3rem !important; }
  .values-grid { grid-template-columns: 1fr 1fr !important; gap: 2rem !important; }
}
@media (max-width: 500px) { .values-grid { grid-template-columns: 1fr !important; } }

.nav-cta { padding: 0.6rem 1.1rem !important; }
.nav.over-dark:not(.scrolled) .nav-cta { color: var(--paper) !important; border-color: rgba(255,255,255,0.45) !important; }
.nav.over-dark:not(.scrolled) .nav-cta:hover { background: var(--paper) !important; color: var(--ink) !important; border-color: var(--paper) !important; }

/* ============================================================
   PAGE-HERO compatibility (some pages may still call PageHero)
   ============================================================ */
.page-hero { position: relative; width: 100%; display: flex; align-items: flex-end; overflow: hidden; background: var(--ink); color: var(--paper); padding-bottom: 4rem; }
.page-hero-bg { position: absolute; inset: 0; z-index: 0; }
.page-hero-bg img { width: 100%; height: 100%; object-fit: cover; }
.page-hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,16,12,0.65) 0%, rgba(20,16,12,0.3) 45%, rgba(20,16,12,0.85) 100%); }
.page-hero-content { position: relative; z-index: 2; padding-top: 8rem; padding-bottom: 1rem; }
.page-hero-content .hero-eyebrow { margin-bottom: 1.1rem; display: inline-flex; }
.page-hero-content .hero-title { font-family: var(--serif); font-size: clamp(2.5rem, 8vw, 6.5rem); margin-bottom: 1.25rem; max-width: 20ch; color: var(--paper); line-height: 0.95; }
.page-hero-content .hero-title em { font-style: italic; color: var(--accent-soft); }
.page-hero-content .hero-sub { font-size: 1.0625rem; color: rgba(236,228,214,0.85); max-width: 52ch; }
.hero-eyebrow { font-family: var(--mono); font-size: 0.6875rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--accent-soft); display: inline-flex; align-items: center; gap: 0.7rem; }
.hero-eyebrow::before { content: ''; width: 18px; height: 1px; background: currentColor; }

/* ============================================================
   FLOAT QUOTE + CURSOR
   ============================================================ */
.float-quote { position: fixed; bottom: 1.75rem; right: 1.75rem; z-index: 50; display: flex; align-items: center; gap: 0.7rem; padding: 0.9rem 1.4rem; background: var(--accent); color: var(--paper-2); font-family: var(--mono); font-size: 0.625rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; box-shadow: 0 12px 36px rgba(20,16,12,0.3); transition: all 0.4s var(--ease); opacity: 0; transform: translateY(18px); }
.float-quote.visible { opacity: 1; transform: translateY(0); }
.float-quote:hover { background: var(--accent-deep); transform: translateY(-2px); }
.float-quote .pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--paper-2); position: relative; }
.float-quote .pulse::after { content: ''; position: absolute; inset: 0; border-radius: 50%; background: var(--paper-2); animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.6); opacity: 0; } }

.cursor-dot { position: fixed; width: 7px; height: 7px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; mix-blend-mode: multiply; transform: translate(-50%,-50%); transition: width 0.3s var(--ease), height 0.3s var(--ease), background 0.3s var(--ease); }
.cursor-dot.hover { width: 36px; height: 36px; background: rgba(181,70,46,0.25); }
@media (max-width: 980px) { .cursor-dot { display: none; } }

.teaser-cta { display: flex; justify-content: center; margin-top: 4rem; }
.teaser-cta .btn { min-width: 260px; }

.section-num { font-family: var(--mono); font-size: 0.75rem; color: var(--accent); display: inline-block; margin-right: 1rem; }

/* legacy marquee kept (used on some pages) */
.marquee { background: var(--ink); color: var(--paper); padding: 1rem 0; overflow: hidden; border-top: 1px solid rgba(255,255,255,0.08); border-bottom: 1px solid rgba(255,255,255,0.08); }
.marquee-track { display: flex; gap: 3rem; animation: ticker 40s linear infinite; white-space: nowrap; width: max-content; }
.marquee-item { display: inline-flex; align-items: center; gap: 0.9rem; font-family: var(--mono); font-size: 0.8125rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(236,228,214,0.8); }
.marquee-item .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent-soft); }

/* ============================================================
   B2B / TRADE  (Atlas styling)
   ============================================================ */
.b2b-hero { position: relative; min-height: 92vh; display: flex; align-items: flex-end; padding: 8rem 0 5rem; color: var(--paper); overflow: hidden; }
.b2b-hero-bg { position: absolute; inset: 0; z-index: 0; }
.b2b-hero-bg img { width: 100%; height: 100%; object-fit: cover; }
.b2b-hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,16,12,0.55) 0%, rgba(20,16,12,0.3) 35%, rgba(20,16,12,0.94) 100%); }
.b2b-hero-content { position: relative; z-index: 1; max-width: 820px; }
.b2b-hero-content .hero-title { font-family: var(--serif); font-size: clamp(3rem,9vw,7rem); line-height: 0.92; margin: 1.25rem 0 1.5rem; color: var(--paper); }
.b2b-hero-content .hero-title em { font-style: italic; color: var(--accent-soft); }
.b2b-hero-content .hero-sub { color: rgba(236,228,214,0.85); max-width: 60ch; margin-bottom: 2.25rem; font-size: 1.0625rem; }
.b2b-hero-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 2rem; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid rgba(236,228,214,0.2); }
.b2b-hero-stats .num { font-family: var(--serif); font-size: 2.75rem; color: var(--paper); line-height: 1; margin-bottom: 0.4rem; }
.b2b-hero-stats .num span { font-size: 1.4rem; color: var(--accent-soft); }
.b2b-hero-stats .lbl { font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(236,228,214,0.6); }

.b2b-intro-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 5rem; align-items: start; }
.b2b-intro-grid .display em { font-style: italic; color: var(--accent); }

.b2b-benefits-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1.5rem; }
.b2b-benefit { position: relative; padding: 2.25rem 1.9rem 2rem; border-top: 3px solid currentColor; transition: transform 0.5s var(--ease), box-shadow 0.5s var(--ease); }
.b2b-benefit:hover { transform: translateY(-4px); box-shadow: 0 24px 48px -22px rgba(20,16,12,0.25); }
.b2b-benefit:nth-child(6n+1) { background: var(--paper-3); color: var(--accent); }
.b2b-benefit:nth-child(6n+2) { background: var(--ink); color: var(--accent-soft); }
.b2b-benefit:nth-child(6n+3) { background: var(--paper-2); color: var(--gilt); }
.b2b-benefit:nth-child(6n+4) { background: var(--paper-3); color: var(--gilt); }
.b2b-benefit:nth-child(6n+5) { background: var(--ink); color: var(--accent-soft); }
.b2b-benefit:nth-child(6n+6) { background: var(--paper-2); color: var(--accent); }
.b2b-benefit-num { font-family: var(--mono); font-size: 0.8125rem; letter-spacing: 0.1em; color: currentColor; margin-bottom: 1.25rem; }
.b2b-benefit h4 { font-family: var(--serif); font-size: 1.5rem; font-weight: 400; color: var(--ink); margin-bottom: 0.8rem; line-height: 1.25; }
.b2b-benefit p { font-family: var(--sans); font-size: 0.9375rem; color: var(--fg-muted); line-height: 1.6; }
.b2b-benefit:nth-child(6n+2) h4, .b2b-benefit:nth-child(6n+5) h4 { color: var(--paper); }
.b2b-benefit:nth-child(6n+2) p, .b2b-benefit:nth-child(6n+5) p { color: rgba(236,228,214,0.78); }

.b2b-pkg-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 1.5rem; margin-top: 3.5rem; }
.b2b-pkg { position: relative; aspect-ratio: 3/4; overflow: hidden; background: var(--ink); color: var(--paper); display: flex; flex-direction: column; justify-content: space-between; padding: 1.4rem; cursor: default; transition: transform 0.5s var(--ease); border: 1px solid var(--line); }
.b2b-pkg:hover { transform: translateY(-4px); }
.b2b-pkg-img { position: absolute; inset: 0; z-index: 0; }
.b2b-pkg-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s var(--ease); }
.b2b-pkg:hover .b2b-pkg-img img { transform: scale(1.06); }
.b2b-pkg-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(20,16,12,0.5) 0%, rgba(20,16,12,0.05) 35%, rgba(20,16,12,0.05) 55%, rgba(20,16,12,0.9) 100%); z-index: 1; }
.b2b-pkg-top, .b2b-pkg-bottom { position: relative; z-index: 2; }
.b2b-pkg-code { font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.16em; color: rgba(236,228,214,0.8); margin-bottom: 0.5rem; }
.b2b-pkg-title { font-family: var(--serif); font-size: 1.45rem; font-weight: 400; line-height: 1.12; color: var(--paper); margin-bottom: 0.75rem; text-shadow: 0 2px 12px rgba(0,0,0,0.4); }
.b2b-pkg-meta { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 0.75rem; }
.b2b-pkg-meta span { display: inline-flex; align-items: center; gap: 0.35rem; font-family: var(--mono); font-size: 0.625rem; letter-spacing: 0.04em; color: rgba(236,228,214,0.9); text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.b2b-pkg-badge { display: inline-block; padding: 0.35rem 0.7rem; background: var(--accent); color: var(--paper-2); font-family: var(--mono); font-size: 0.5625rem; letter-spacing: 0.08em; text-transform: uppercase; }
.b2b-pkg-bottom { text-align: right; align-self: flex-end; }

function DestinationHero({ place, eyebrow, title, sub, image, images, actions, short = false, indexLabel }) {
  const meta = PLACES[place] || PLACES.paris;
  const slides = images && images.length ? images : [image];

  const total = slides.length;

  React.useEffect(() => {

    const id = setInterval(() => setActive((i) => (i + 1) % total), 6000);
    return () => clearInterval(id);
  }, [total]);

  const [scrollY, setScrollY] = React.useState(0);
  React.useEffect(() => {
    const onScroll = () => setScrollY(window.scrollY);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);

    <section className={`dhero ${short ? 'short' : ''}`}>

        {slides.map((s, i) => (
          <div key={i} className={i === active ? 'active' : ''}>

        {sub && <p className="dhero-sub">{sub}</p>}
        {actions && <div className="dhero-actions">{actions}</div>}
        <div className="dhero-meta">
          <div><div className="k">Coordinates</div><div className="v">{meta.coord}</div></div>
          <div><div className="k">Time zone</div><div className="v">{meta.tz}</div></div>
          <div><div className="k">Maison</div><div className="v">KTS · est. 1987</div></div>
          <div><div className="k">Reference</div><div className="v">{meta.code}-{meta.dossier.split(' ')[1]}</div></div>
        </div>

      {total > 1 && (
        <div className="dhero-rotator-counter">

            </button>

function CursorDot() {
  const dotRef = React.useRef(null);
  React.useEffect(() => {
    const dot = dotRef.current;
    if (!dot) return;
    const move = (e) => { dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px'; };
    const over = (e) => {
      if (e.target.closest('a, button, .service-card, .dest-card, .team-card, .b2b-pkg')) dot.classList.add('hover');
      else dot.classList.remove('hover');
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseover', over);
    return () => { window.removeEventListener('mousemove', move); window.removeEventListener('mouseover', over); };
  }, []);
  return <div className="cursor-dot" ref={dotRef}></div>;
}

function FloatQuote() {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > 600);
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return (
    <a className={`float-quote ${visible ? 'visible' : ''}`} href="contact.html">
      <span className="pulse"></span><span>Plan a journey</span>
    </a>
  );
}

function useReveal() {
  React.useEffect(() => {
    const els = document.querySelectorAll('.reveal:not(.in):not([data-reveal-observed])');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -8% 0px' });
    els.forEach((el) => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) el.classList.add('in');
      else { el.setAttribute('data-reveal-observed', '1'); io.observe(el); }
    });
    return () => io.disconnect();
  });
}

// Backwards-compatible PageHero (delegates to DestinationHero)
function PageHero({ eyebrow, title, sub, image, place = 'paris', short = true }) {
  return <DestinationHero place={place} eyebrow={eyebrow} title={title} sub={sub} image={image} short={short} />;
}

// Page wrapper — sets the per-page destination accent via data-place
function Page({ current, place = 'paris', children }) {
  const [lang, setLang] = React.useState('EN');
  useReveal();
  React.useEffect(() => {
    document.documentElement.setAttribute('data-place', place);
  }, [place]);
  return (
    <div data-place={place}>
      <CursorDot />
      <Ticker />
      <Nav current={current} lang={lang} setLang={setLang} />
      {children}
      <FloatQuote />
    </div>
  );
}

  function run() {

    for (var i = 0; i < nodes.length; i++) {
      var code = Babel.transform(nodes[i].textContent, {
        presets: [['react', { runtime: 'classic' }]],
        sourceType: 'script'
      }).code;
      (0, eval)(code);
    }
  }
  if (window.Babel) run();
  else window.addEventListener('DOMContentLoaded', run);
})();
</script>
